name: Render Keep Alive

concurrency:
  group: render-keepalive
  cancel-in-progress: false

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping backend
        env:
          RENDER_BASE_URL: ${{ secrets.RENDER_BASE_URL }}
        run: |
          if [ -z "$RENDER_BASE_URL" ]; then
            echo "Missing secret: RENDER_BASE_URL"
            exit 1
          fi

          curl --fail --show-error --silent \
            --retry 2 \
            --retry-all-errors \
            --connect-timeout 15 \
            --max-time 45 \
            "$RENDER_BASE_URL/health?db=1" > /dev/null

          echo "Ping success: $RENDER_BASE_URL/health?db=1"
