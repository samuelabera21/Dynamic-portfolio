name: Render Keep Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        env:
          RENDER_BASE_URL: ${{ secrets.RENDER_BASE_URL }}
        run: |
          if [ -z "$RENDER_BASE_URL" ]; then
            echo "Missing secret: RENDER_BASE_URL"
            exit 1
          fi

          curl --fail --show-error --silent \
            --max-time 90 \
            "$RENDER_BASE_URL/settings" > /dev/null

          echo "Ping success: $RENDER_BASE_URL/settings"
